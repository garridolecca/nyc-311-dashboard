<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calling 311 in New York City</title>

  <!-- Chart.js MUST load before ArcGIS to avoid AMD conflict -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- ArcGIS JS SDK 4.27 -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.27/"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      cursor: none;
    }

    #viewDiv {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* Canvas overlay for lens + points */
    #lensCanvas {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* Interaction layer captures mouse but is transparent */
    #interactionLayer {
      position: absolute;
      inset: 0;
      z-index: 15;
      cursor: none;
    }

    /* Title overlay */
    .title-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 20px 32px;
      background: linear-gradient(180deg, rgba(10,14,26,0.85) 0%, rgba(10,14,26,0) 100%);
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .title-left h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .title-left .subtitle {
      font-size: 13px;
      color: #7b8ca8;
      margin-top: 4px;
      font-weight: 400;
    }

    /* Category selector */
    .category-bar {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 6px;
      padding: 6px;
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .cat-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #7b8ca8;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: 0.3px;
    }

    .cat-btn:hover {
      color: #c0c8d8;
      background: rgba(255,255,255,0.05);
    }

    .cat-btn.active {
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Year selector */
    .year-bar {
      position: absolute;
      top: 20px;
      right: 32px;
      z-index: 20;
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .year-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #7b8ca8;
      transition: all 0.25s;
    }

    .year-btn:hover { color: #c0c8d8; }
    .year-btn.active { color: #fff; background: rgba(255,255,255,0.12); }

    /* Stats inside lens - shown as tooltip near lens */
    .lens-tooltip {
      position: absolute;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 13px;
      text-align: center;
    }

    .lens-tooltip.visible { opacity: 1; }

    .lens-count {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .lens-label {
      font-size: 11px;
      color: #7b8ca8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    /* Instruction */
    .instruction {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      color: #4a5568;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 1s;
    }

    .instruction.hidden { opacity: 0; }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 52px; height: 52px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top: 2px solid #6c8cff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 16px;
      font-size: 13px;
      color: #4a5568;
      letter-spacing: 1px;
    }

    /* Hide ArcGIS UI elements */
    .esri-ui { display: none !important; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-text">Loading 311 data...</div>
  </div>

  <div id="viewDiv"></div>
  <canvas id="lensCanvas"></canvas>
  <div id="interactionLayer"></div>

  <!-- Title -->
  <div class="title-bar">
    <div class="title-left">
      <h1>Calling 311 in New York City</h1>
      <div class="subtitle">7 million service requests, 2022 &ndash; 2025</div>
    </div>
  </div>

  <!-- Year selector -->
  <div class="year-bar">
    <button class="year-btn active" data-year="all">All</button>
    <button class="year-btn" data-year="2022">2022</button>
    <button class="year-btn" data-year="2023">2023</button>
    <button class="year-btn" data-year="2024">2024</button>
    <button class="year-btn" data-year="2025">2025</button>
  </div>

  <!-- Category bar -->
  <div class="category-bar">
    <button class="cat-btn active" data-cat="all">
      <div class="cat-dot" style="background:#fff"></div>All
    </button>
    <button class="cat-btn" data-cat="noise">
      <div class="cat-dot" style="background:#f97316"></div>Noise
    </button>
    <button class="cat-btn" data-cat="parking">
      <div class="cat-dot" style="background:#3b82f6"></div>Parking
    </button>
    <button class="cat-btn" data-cat="heating">
      <div class="cat-dot" style="background:#ef4444"></div>Heating
    </button>
    <button class="cat-btn" data-cat="rodent">
      <div class="cat-dot" style="background:#a855f7"></div>Rodents
    </button>
    <button class="cat-btn" data-cat="dumping">
      <div class="cat-dot" style="background:#22c55e"></div>Illegal Dumping
    </button>
  </div>

  <div class="instruction" id="instruction">Move your cursor to explore the map</div>

  <!-- Lens center stats -->
  <div class="lens-tooltip" id="lensTooltip">
    <div class="lens-count" id="lensCount">0</div>
    <div class="lens-label">complaints</div>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/geometry/Point",
      "esri/geometry/SpatialReference"
    ], function(Map, MapView, Point, SpatialReference) {

      // ═══════════════════════════════════════
      // CONFIG
      // ═══════════════════════════════════════
      const LENS_RADIUS = 140;
      const POINT_RADIUS_DIM = 1.2;
      const POINT_RADIUS_BRIGHT = 2.4;
      const TOTAL_POINTS = 5000;

      const CATEGORIES = {
        noise:   { color: [249, 115, 22],  label: "Noise" },
        parking: { color: [59, 130, 246],  label: "Parking" },
        heating: { color: [239, 68, 68],   label: "Heating" },
        rodent:  { color: [168, 85, 247],  label: "Rodents" },
        dumping: { color: [34, 197, 94],   label: "Illegal Dumping" }
      };

      const CAT_KEYS = Object.keys(CATEGORIES);

      // ═══════════════════════════════════════
      // DATA GENERATION
      // ═══════════════════════════════════════
      function seededRNG(seed) {
        let s = seed;
        return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
      }

      const BOROUGHS = [
        { name: "Manhattan",     w: 0.22, lngR: [-74.02, -73.93], latR: [40.70, 40.88] },
        { name: "Brooklyn",      w: 0.28, lngR: [-74.04, -73.86], latR: [40.57, 40.74] },
        { name: "Queens",        w: 0.22, lngR: [-73.96, -73.70], latR: [40.56, 40.80] },
        { name: "Bronx",         w: 0.20, lngR: [-73.93, -73.77], latR: [40.79, 40.92] },
        { name: "Staten Island", w: 0.08, lngR: [-74.26, -74.05], latR: [40.50, 40.65] }
      ];

      // Category weights vary by borough for realism
      const BOROUGH_CAT_WEIGHTS = {
        "Manhattan":     { noise: 0.35, parking: 0.15, heating: 0.25, rodent: 0.10, dumping: 0.15 },
        "Brooklyn":      { noise: 0.25, parking: 0.20, heating: 0.25, rodent: 0.15, dumping: 0.15 },
        "Queens":        { noise: 0.20, parking: 0.25, heating: 0.20, rodent: 0.15, dumping: 0.20 },
        "Bronx":         { noise: 0.20, parking: 0.15, heating: 0.35, rodent: 0.20, dumping: 0.10 },
        "Staten Island": { noise: 0.15, parking: 0.20, heating: 0.15, rodent: 0.10, dumping: 0.40 }
      };

      function pickWeighted(items, weights, rng) {
        const r = rng();
        let c = 0;
        for (let i = 0; i < items.length; i++) { c += weights[i]; if (r < c) return items[i]; }
        return items[items.length - 1];
      }

      function generatePoints(n) {
        const rng = seededRNG(311);
        const pts = [];
        const boroughNames = BOROUGHS.map(b => b.name);
        const boroughWeights = BOROUGHS.map(b => b.w);
        const years = [2022, 2023, 2024, 2025];
        const yearWeights = [0.22, 0.26, 0.28, 0.24];

        for (let i = 0; i < n; i++) {
          const borough = pickWeighted(boroughNames, boroughWeights, rng);
          const b = BOROUGHS.find(x => x.name === borough);
          const lng = b.lngR[0] + rng() * (b.lngR[1] - b.lngR[0]);
          const lat = b.latR[0] + rng() * (b.latR[1] - b.latR[0]);
          const catWeights = BOROUGH_CAT_WEIGHTS[borough];
          const cat = pickWeighted(CAT_KEYS, CAT_KEYS.map(k => catWeights[k]), rng);
          const year = pickWeighted(years, yearWeights, rng);

          pts.push({ lng, lat, cat, year, borough });
        }
        return pts;
      }

      const allPoints = generatePoints(TOTAL_POINTS);

      // ═══════════════════════════════════════
      // FILTER STATE
      // ═══════════════════════════════════════
      let activeCat = "all";
      let activeYear = "all";
      let mouseX = -999, mouseY = -999;
      let mouseOnMap = false;
      let animLensRadius = 0;

      function getFilteredPoints() {
        return allPoints.filter(p => {
          if (activeCat !== "all" && p.cat !== activeCat) return false;
          if (activeYear !== "all" && p.year !== parseInt(activeYear)) return false;
          return true;
        });
      }

      // ═══════════════════════════════════════
      // MAP
      // ═══════════════════════════════════════
      const map = new Map({ basemap: "dark-gray-vector" });

      const view = new MapView({
        container: "viewDiv",
        map,
        center: [-73.95, 40.72],
        zoom: 11,
        constraints: { minZoom: 10, maxZoom: 16 },
        navigation: { mouseWheelZoomEnabled: true, browserTouchPanEnabled: true }
      });

      // ═══════════════════════════════════════
      // CANVAS SETUP
      // ═══════════════════════════════════════
      const canvas = document.getElementById("lensCanvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth * window.devicePixelRatio;
        canvas.height = window.innerHeight * window.devicePixelRatio;
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // ═══════════════════════════════════════
      // SCREEN PROJECTION CACHE
      // ═══════════════════════════════════════
      let screenPoints = []; // { sx, sy, cat, year, borough } in screen coords

      function projectPoints() {
        const pts = getFilteredPoints();
        screenPoints = pts.map(p => {
          const sp = view.toScreen(new Point({ longitude: p.lng, latitude: p.lat }));
          return sp ? { sx: sp.x, sy: sp.y, cat: p.cat, year: p.year, borough: p.borough } : null;
        }).filter(Boolean);
      }

      // ═══════════════════════════════════════
      // DRAW
      // ═══════════════════════════════════════
      function drawFrame() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        ctx.clearRect(0, 0, W, H);

        // Animate lens radius
        const targetR = mouseOnMap ? LENS_RADIUS : 0;
        animLensRadius += (targetR - animLensRadius) * 0.12;

        const lx = mouseX, ly = mouseY;
        const R = animLensRadius;

        // Dim overlay outside lens
        if (R > 2) {
          ctx.save();
          ctx.fillStyle = "rgba(6, 8, 16, 0.55)";
          ctx.beginPath();
          ctx.rect(0, 0, W, H);
          ctx.arc(lx, ly, R, 0, Math.PI * 2, true);
          ctx.fill();
          ctx.restore();
        }

        // Collect points inside lens for radial chart
        const insidePoints = [];

        // Draw all points
        for (const p of screenPoints) {
          const dx = p.sx - lx;
          const dy = p.sy - ly;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const inside = dist < R;
          const col = CATEGORIES[p.cat].color;

          if (inside) {
            insidePoints.push(p);
            ctx.fillStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, 0.9)`;
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, POINT_RADIUS_BRIGHT, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, 0.18)`;
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, POINT_RADIUS_DIM, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Draw lens ring
        if (R > 2) {
          // Outer glow
          const grad = ctx.createRadialGradient(lx, ly, Math.max(0, R - 3), lx, ly, R + 8);
          grad.addColorStop(0, "rgba(108, 140, 255, 0.15)");
          grad.addColorStop(1, "rgba(108, 140, 255, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(lx, ly, R + 8, 0, Math.PI * 2);
          ctx.arc(lx, ly, R - 3, 0, Math.PI * 2, true);
          ctx.fill();

          // Ring
          ctx.strokeStyle = "rgba(108, 140, 255, 0.35)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(lx, ly, R, 0, Math.PI * 2);
          ctx.stroke();

          // Draw radial chart around lens
          drawRadialChart(lx, ly, R, insidePoints);

          // Update tooltip
          updateTooltip(lx, ly, R, insidePoints.length);
        }

        requestAnimationFrame(drawFrame);
      }

      function drawRadialChart(cx, cy, radius, points) {
        if (points.length === 0) return;

        // Count by category
        const counts = {};
        CAT_KEYS.forEach(k => counts[k] = 0);
        points.forEach(p => counts[p.cat]++);

        const total = points.length;
        const chartR = radius + 18;
        const arcWidth = 8;
        let startAngle = -Math.PI / 2;

        // Draw arcs
        for (const key of CAT_KEYS) {
          if (counts[key] === 0) continue;
          const sweep = (counts[key] / total) * Math.PI * 2;
          const col = CATEGORIES[key].color;

          ctx.strokeStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, 0.85)`;
          ctx.lineWidth = arcWidth;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.arc(cx, cy, chartR, startAngle + 0.02, startAngle + sweep - 0.02);
          ctx.stroke();

          // Label on large segments
          if (sweep > 0.4) {
            const midAngle = startAngle + sweep / 2;
            const labelR = chartR + 20;
            const lx2 = cx + Math.cos(midAngle) * labelR;
            const ly2 = cy + Math.sin(midAngle) * labelR;
            const pct = Math.round((counts[key] / total) * 100);

            ctx.font = "600 10px Inter, system-ui, sans-serif";
            ctx.fillStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, 0.9)`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(`${pct}%`, lx2, ly2);
          }

          startAngle += sweep;
        }

        // Year breakdown inside lens (small bars)
        if (activeYear === "all" && points.length > 10) {
          const yearCounts = {};
          points.forEach(p => { yearCounts[p.year] = (yearCounts[p.year] || 0) + 1; });
          const years = [2022, 2023, 2024, 2025];
          const maxYC = Math.max(...years.map(y => yearCounts[y] || 0), 1);
          const barAreaW = 80;
          const barH = 3;
          const barGap = 8;
          const startY = cy + radius * 0.25;
          const startX = cx - barAreaW / 2;

          years.forEach((y, i) => {
            const count = yearCounts[y] || 0;
            const w = (count / maxYC) * barAreaW;
            const by = startY + i * barGap;

            // Year label
            ctx.font = "500 9px Inter, system-ui, sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";
            ctx.fillText(String(y), startX - 5, by + barH / 2);

            // Bar bg
            ctx.fillStyle = "rgba(255,255,255,0.06)";
            ctx.beginPath();
            ctx.roundRect(startX, by, barAreaW, barH, 1.5);
            ctx.fill();

            // Bar fill
            ctx.fillStyle = "rgba(108, 140, 255, 0.6)";
            ctx.beginPath();
            ctx.roundRect(startX, by, w, barH, 1.5);
            ctx.fill();

            // Count
            ctx.font = "600 9px Inter, system-ui, sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.textAlign = "left";
            ctx.fillText(String(count), startX + barAreaW + 5, by + barH / 2);
          });
        }
      }

      function updateTooltip(cx, cy, R, count) {
        const tt = document.getElementById("lensTooltip");
        const countEl = document.getElementById("lensCount");

        if (count > 0 && R > 10) {
          tt.classList.add("visible");
          tt.style.left = (cx - 40) + "px";
          tt.style.top = (cy - R * 0.55) + "px";
          tt.style.width = "80px";
          countEl.textContent = count.toLocaleString();
        } else {
          tt.classList.remove("visible");
        }
      }

      // ═══════════════════════════════════════
      // INTERACTION
      // ═══════════════════════════════════════
      const interLayer = document.getElementById("interactionLayer");

      interLayer.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        mouseOnMap = true;

        // Hide instruction after first move
        document.getElementById("instruction").classList.add("hidden");
      });

      interLayer.addEventListener("mouseleave", () => {
        mouseOnMap = false;
      });

      // Pass scroll/wheel events through to the map
      interLayer.addEventListener("wheel", (e) => {
        const mapEvt = new WheelEvent("wheel", {
          clientX: e.clientX, clientY: e.clientY,
          deltaX: e.deltaX, deltaY: e.deltaY, deltaMode: e.deltaMode,
          bubbles: true, cancelable: true
        });
        document.getElementById("viewDiv").dispatchEvent(mapEvt);
      });

      // Pass drag events for map panning
      let isDragging = false;
      let dragStartX, dragStartY;

      interLayer.addEventListener("mousedown", (e) => {
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        interLayer.style.pointerEvents = "none";
      });

      document.addEventListener("mouseup", () => {
        if (isDragging) {
          isDragging = false;
          interLayer.style.pointerEvents = "auto";
        }
      });

      document.addEventListener("mousemove", (e) => {
        if (isDragging) {
          mouseX = e.clientX;
          mouseY = e.clientY;
        }
      });

      // Category buttons
      document.querySelectorAll(".cat-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeCat = btn.dataset.cat;
          projectPoints();
        });
      });

      // Year buttons
      document.querySelectorAll(".year-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".year-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeYear = btn.dataset.year;
          projectPoints();
        });
      });

      // ═══════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════
      view.when(() => {
        projectPoints();

        // Re-project on view change (pan/zoom)
        view.watch("extent", () => projectPoints());
        view.watch("zoom", () => projectPoints());

        // Start render loop
        requestAnimationFrame(drawFrame);

        // Hide loading
        setTimeout(() => {
          document.getElementById("loadingOverlay").classList.add("hidden");
        }, 600);
      }, (err) => {
        console.error("View failed:", err);
        projectPoints();
        requestAnimationFrame(drawFrame);
        document.getElementById("loadingOverlay").classList.add("hidden");
      });

    });
  </script>
</body>
</html>
