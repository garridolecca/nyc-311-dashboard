<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calling 311 in New York City</title>

  <!-- Chart.js MUST load before ArcGIS to avoid AMD conflict -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- ArcGIS JS SDK 4.27 -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.27/"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      cursor: none;
    }

    #viewDiv {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #lensCanvas {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #interactionLayer {
      position: absolute;
      inset: 0;
      z-index: 15;
      cursor: none;
    }

    /* Title */
    .title-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 20px 32px;
      background: linear-gradient(180deg, rgba(10,14,26,0.85) 0%, rgba(10,14,26,0) 100%);
      pointer-events: none;
    }

    .title-bar h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .title-bar .subtitle {
      font-size: 13px;
      color: #7b8ca8;
      margin-top: 4px;
    }

    /* Shared pill style */
    .pill-bar {
      z-index: 20;
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .pill-btn {
      padding: 7px 14px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #7b8ca8;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pill-btn:hover { color: #c0c8d8; background: rgba(255,255,255,0.05); }
    .pill-btn.active { color: #fff; background: rgba(255,255,255,0.12); }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Category bar — bottom center */
    .category-bar {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Year bar — top right */
    .year-bar {
      position: absolute;
      top: 20px;
      right: 32px;
    }

    /* Radius bar — left center */
    .radius-bar {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      flex-direction: column;
    }

    .radius-bar .pill-btn {
      padding: 6px 12px;
      font-size: 11px;
      justify-content: center;
    }

    .radius-label {
      font-size: 9px;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      text-align: center;
      padding: 4px 0 2px;
      pointer-events: none;
    }

    /* Lens tooltip */
    .lens-tooltip {
      position: absolute;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      text-align: center;
    }

    .lens-tooltip.visible { opacity: 1; }

    .lens-count {
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .lens-sublabel {
      font-size: 11px;
      color: #7b8ca8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    .lens-miles {
      font-size: 10px;
      color: #4a5568;
      margin-top: 1px;
    }

    /* Instruction */
    .instruction {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      color: #4a5568;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 1s;
    }

    .instruction.hidden { opacity: 0; }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 52px; height: 52px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top: 2px solid #6c8cff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 16px;
      font-size: 13px;
      color: #4a5568;
      letter-spacing: 1px;
    }

    .esri-ui { display: none !important; }

    /* Legend panel */
    .legend-panel {
      position: absolute;
      bottom: 32px;
      right: 24px;
      z-index: 20;
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px;
      pointer-events: none;
    }

    .legend-title {
      font-size: 9px;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
    }

    .legend-section {
      margin-bottom: 10px;
    }

    .legend-section:last-child {
      margin-bottom: 0;
    }

    .legend-section-label {
      font-size: 10px;
      color: #7b8ca8;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .legend-row:last-child {
      margin-bottom: 0;
    }

    .legend-swatch {
      width: 20px;
      height: 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-text {
      font-size: 11px;
      color: #b0bcc8;
    }

    .legend-gradient {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
    }

    .legend-gradient-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
    }

    .legend-gradient-labels {
      display: flex;
      justify-content: space-between;
    }

    .legend-gradient-labels span {
      font-size: 9px;
      color: #4a5568;
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-text">Loading 311 data...</div>
  </div>

  <div id="viewDiv"></div>
  <canvas id="lensCanvas"></canvas>
  <div id="interactionLayer"></div>

  <!-- Title -->
  <div class="title-bar">
    <h1>Calling 311 in New York City</h1>
    <div class="subtitle">7 million service requests, 2022 &ndash; 2025</div>
  </div>

  <!-- Year selector -->
  <div class="pill-bar year-bar">
    <button class="pill-btn active" data-year="all">All</button>
    <button class="pill-btn" data-year="2022">2022</button>
    <button class="pill-btn" data-year="2023">2023</button>
    <button class="pill-btn" data-year="2024">2024</button>
    <button class="pill-btn" data-year="2025">2025</button>
  </div>

  <!-- Radius selector -->
  <div class="pill-bar radius-bar">
    <div class="radius-label">Radius</div>
    <button class="pill-btn" data-miles="1">1 mi</button>
    <button class="pill-btn active" data-miles="2">2 mi</button>
    <button class="pill-btn" data-miles="3">3 mi</button>
    <button class="pill-btn" data-miles="4">4 mi</button>
    <button class="pill-btn" data-miles="5">5 mi</button>
  </div>

  <!-- Category bar -->
  <div class="pill-bar category-bar">
    <button class="pill-btn active" data-cat="all">
      <div class="cat-dot" style="background:#fff"></div>All
    </button>
    <button class="pill-btn" data-cat="noise">
      <div class="cat-dot" style="background:#f97316"></div>Noise
    </button>
    <button class="pill-btn" data-cat="parking">
      <div class="cat-dot" style="background:#3b82f6"></div>Parking
    </button>
    <button class="pill-btn" data-cat="heating">
      <div class="cat-dot" style="background:#ef4444"></div>Heating
    </button>
    <button class="pill-btn" data-cat="rodent">
      <div class="cat-dot" style="background:#a855f7"></div>Rodents
    </button>
    <button class="pill-btn" data-cat="dumping">
      <div class="cat-dot" style="background:#22c55e"></div>Illegal Dumping
    </button>
  </div>

  <div class="instruction" id="instruction">Move your cursor to explore the map</div>

  <!-- Legend -->
  <div class="legend-panel">
    <div class="legend-title">Bar Chart Legend</div>

    <div class="legend-section">
      <div class="legend-section-label">Year (shade within bars)</div>
      <div class="legend-gradient">
        <div class="legend-gradient-bar" style="background:rgba(100,140,210,0.55)"></div>
        <div class="legend-gradient-bar" style="background:rgba(130,170,240,0.65)"></div>
        <div class="legend-gradient-bar" style="background:rgba(170,200,255,0.78)"></div>
        <div class="legend-gradient-bar" style="background:rgba(220,235,255,0.9)"></div>
      </div>
      <div class="legend-gradient-labels">
        <span>2022</span>
        <span>2023</span>
        <span>2024</span>
        <span>2025</span>
      </div>
      <div style="font-size:9px;color:#4a5568;margin-top:4px;">Darker = older &nbsp; Lighter = newer</div>
    </div>

    <div class="legend-section">
      <div class="legend-section-label">Bar length</div>
      <div style="font-size:10px;color:#7b8ca8;">Longer bar = more complaints</div>
    </div>
  </div>

  <div class="lens-tooltip" id="lensTooltip">
    <div class="lens-count" id="lensCount">0</div>
    <div class="lens-sublabel">complaints</div>
    <div class="lens-miles" id="lensMiles">2 mi radius</div>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/geometry/Point"
    ], function(Map, MapView, Point) {

      // ═══════════════════════════════════════
      // CONFIG
      // ═══════════════════════════════════════
      const MILES_TO_METERS = 1609.344;
      const TOTAL_POINTS = 6000;
      const POINT_R_DIM = 1.2;
      const POINT_R_BRIGHT = 2.8;
      const BAR_MAX_LENGTH = 70;   // max radial bar length in px
      const BAR_WIDTH = 7;         // width of each year sub-bar
      const BAR_GAP = 2;           // gap between year sub-bars
      const RING_GAP = 14;         // gap between lens circle and bars
      const YEARS = [2022, 2023, 2024, 2025];
      const YEAR_COLORS = {
        2022: [100, 140, 210],
        2023: [130, 170, 240],
        2024: [170, 200, 255],
        2025: [220, 235, 255]
      };

      const CATEGORIES = {
        noise:   { color: [249, 115, 22],  label: "Noise" },
        parking: { color: [59, 130, 246],  label: "Parking" },
        heating: { color: [239, 68, 68],   label: "Heating" },
        rodent:  { color: [168, 85, 247],  label: "Rodents" },
        dumping: { color: [34, 197, 94],   label: "Illegal Dumping" }
      };

      const CAT_KEYS = Object.keys(CATEGORIES);

      // ═══════════════════════════════════════
      // DATA GENERATION
      // ═══════════════════════════════════════
      function seededRNG(seed) {
        let s = seed;
        return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
      }

      const BOROUGHS = [
        { name: "Manhattan",     w: 0.22, lngR: [-74.02, -73.93], latR: [40.70, 40.88] },
        { name: "Brooklyn",      w: 0.28, lngR: [-74.04, -73.86], latR: [40.57, 40.74] },
        { name: "Queens",        w: 0.22, lngR: [-73.96, -73.70], latR: [40.56, 40.80] },
        { name: "Bronx",         w: 0.20, lngR: [-73.93, -73.77], latR: [40.79, 40.92] },
        { name: "Staten Island", w: 0.08, lngR: [-74.26, -74.05], latR: [40.50, 40.65] }
      ];

      const BOROUGH_CAT_W = {
        "Manhattan":     { noise: 0.35, parking: 0.15, heating: 0.25, rodent: 0.10, dumping: 0.15 },
        "Brooklyn":      { noise: 0.25, parking: 0.20, heating: 0.25, rodent: 0.15, dumping: 0.15 },
        "Queens":        { noise: 0.20, parking: 0.25, heating: 0.20, rodent: 0.15, dumping: 0.20 },
        "Bronx":         { noise: 0.20, parking: 0.15, heating: 0.35, rodent: 0.20, dumping: 0.10 },
        "Staten Island": { noise: 0.15, parking: 0.20, heating: 0.15, rodent: 0.10, dumping: 0.40 }
      };

      function pickW(items, weights, rng) {
        const r = rng(); let c = 0;
        for (let i = 0; i < items.length; i++) { c += weights[i]; if (r < c) return items[i]; }
        return items[items.length - 1];
      }

      function generatePoints(n) {
        const rng = seededRNG(311);
        const pts = [];
        const bNames = BOROUGHS.map(b => b.name);
        const bWeights = BOROUGHS.map(b => b.w);
        const yWeights = [0.22, 0.26, 0.28, 0.24];

        for (let i = 0; i < n; i++) {
          const borough = pickW(bNames, bWeights, rng);
          const b = BOROUGHS.find(x => x.name === borough);
          const lng = b.lngR[0] + rng() * (b.lngR[1] - b.lngR[0]);
          const lat = b.latR[0] + rng() * (b.latR[1] - b.latR[0]);
          const cw = BOROUGH_CAT_W[borough];
          const cat = pickW(CAT_KEYS, CAT_KEYS.map(k => cw[k]), rng);
          const year = pickW(YEARS, yWeights, rng);
          pts.push({ lng, lat, cat, year });
        }
        return pts;
      }

      const allPoints = generatePoints(TOTAL_POINTS);

      // ═══════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════
      let activeCat = "all";
      let activeYear = "all";
      let radiusMiles = 2;
      let mouseX = -999, mouseY = -999;
      let mouseOnMap = false;
      let animLensR = 0;

      function getFiltered() {
        return allPoints.filter(p => {
          if (activeCat !== "all" && p.cat !== activeCat) return false;
          if (activeYear !== "all" && p.year !== parseInt(activeYear)) return false;
          return true;
        });
      }

      // Convert miles to screen pixels using map resolution
      function milesToPixels(miles) {
        if (!view.resolution) return 140;
        return (miles * MILES_TO_METERS) / view.resolution;
      }

      // ═══════════════════════════════════════
      // MAP
      // ═══════════════════════════════════════
      const map = new Map({ basemap: "dark-gray-vector" });
      const view = new MapView({
        container: "viewDiv",
        map,
        center: [-73.95, 40.72],
        zoom: 11,
        constraints: { minZoom: 10, maxZoom: 16 },
        navigation: { mouseWheelZoomEnabled: true, browserTouchPanEnabled: true }
      });

      // ═══════════════════════════════════════
      // CANVAS
      // ═══════════════════════════════════════
      const canvas = document.getElementById("lensCanvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        const dpr = window.devicePixelRatio;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // ═══════════════════════════════════════
      // PROJECTION
      // ═══════════════════════════════════════
      let screenPts = [];

      function projectPoints() {
        const pts = getFiltered();
        screenPts = [];
        for (const p of pts) {
          const sp = view.toScreen(new Point({ longitude: p.lng, latitude: p.lat }));
          if (sp) screenPts.push({ sx: sp.x, sy: sp.y, cat: p.cat, year: p.year });
        }
      }

      // ═══════════════════════════════════════
      // DRAW FRAME
      // ═══════════════════════════════════════
      function drawFrame() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        ctx.clearRect(0, 0, W, H);

        const targetR = mouseOnMap ? milesToPixels(radiusMiles) : 0;
        animLensR += (targetR - animLensR) * 0.1;
        const R = animLensR;
        const lx = mouseX, ly = mouseY;

        // Dim overlay
        if (R > 2) {
          ctx.save();
          ctx.fillStyle = "rgba(6, 8, 16, 0.6)";
          ctx.beginPath();
          ctx.rect(0, 0, W, H);
          ctx.arc(lx, ly, R, 0, Math.PI * 2, true);
          ctx.fill();
          ctx.restore();
        }

        // Collect inside points & draw all points
        const inside = [];
        for (const p of screenPts) {
          const dx = p.sx - lx, dy = p.sy - ly;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const isIn = dist < R;
          const col = CATEGORIES[p.cat].color;

          if (isIn) {
            inside.push(p);
            ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.92)`;
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, POINT_R_BRIGHT, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.15)`;
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, POINT_R_DIM, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        if (R > 5) {
          // Lens ring
          ctx.strokeStyle = "rgba(108, 140, 255, 0.30)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(lx, ly, R, 0, Math.PI * 2);
          ctx.stroke();

          // Subtle glow
          const grad = ctx.createRadialGradient(lx, ly, Math.max(0, R - 2), lx, ly, R + 6);
          grad.addColorStop(0, "rgba(108, 140, 255, 0.10)");
          grad.addColorStop(1, "rgba(108, 140, 255, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(lx, ly, R + 6, 0, Math.PI * 2);
          ctx.arc(lx, ly, Math.max(0, R - 2), 0, Math.PI * 2, true);
          ctx.fill();

          // Radial bar chart
          drawRadialBars(lx, ly, R, inside);

          // Tooltip
          updateTooltip(lx, ly, R, inside.length);
        }

        requestAnimationFrame(drawFrame);
      }

      // ═══════════════════════════════════════
      // RADIAL BAR CHART
      // ═══════════════════════════════════════
      function drawRadialBars(cx, cy, R, points) {
        if (points.length === 0) return;

        // Build data: for each category, count per year
        const data = {};
        let globalMax = 0;
        for (const k of CAT_KEYS) {
          data[k] = {};
          for (const y of YEARS) data[k][y] = 0;
        }
        for (const p of points) {
          data[p.cat][p.year]++;
        }
        for (const k of CAT_KEYS) {
          for (const y of YEARS) {
            if (data[k][y] > globalMax) globalMax = data[k][y];
          }
        }
        if (globalMax === 0) return;

        // Determine which categories have data
        const activeCats = CAT_KEYS.filter(k => YEARS.some(y => data[k][y] > 0));
        if (activeCats.length === 0) return;

        // Each category gets an equal angular slice
        const totalAngle = Math.PI * 2;
        const catAngle = totalAngle / activeCats.length;
        const catPadAngle = 0.08; // padding between category groups
        const numYears = YEARS.length;
        const barGroupWidth = numYears * BAR_WIDTH + (numYears - 1) * BAR_GAP;

        const barStart = R + RING_GAP;

        activeCats.forEach((catKey, catIdx) => {
          const catColor = CATEGORIES[catKey].color;
          const sliceStartAngle = -Math.PI / 2 + catIdx * catAngle + catPadAngle / 2;
          const sliceEndAngle = sliceStartAngle + catAngle - catPadAngle;
          const sliceMidAngle = (sliceStartAngle + sliceEndAngle) / 2;

          // Draw year bars radially within this slice
          YEARS.forEach((yr, yIdx) => {
            const count = data[catKey][yr];
            if (count === 0) return;

            const barLen = (count / globalMax) * BAR_MAX_LENGTH;
            const yrColor = YEAR_COLORS[yr];

            // Position: distribute year bars within the angular slice
            const barAngleOffset = ((yIdx - (numYears - 1) / 2) / numYears) * (catAngle - catPadAngle) * 0.6;
            const barAngle = sliceMidAngle + barAngleOffset;

            // Bar as a thick line from barStart to barStart + barLen
            const x1 = cx + Math.cos(barAngle) * barStart;
            const y1 = cy + Math.sin(barAngle) * barStart;
            const x2 = cx + Math.cos(barAngle) * (barStart + barLen);
            const y2 = cy + Math.sin(barAngle) * (barStart + barLen);

            // Draw bar with category-tinted year color
            const r = Math.round(catColor[0] * 0.4 + yrColor[0] * 0.6);
            const g = Math.round(catColor[1] * 0.4 + yrColor[1] * 0.6);
            const b = Math.round(catColor[2] * 0.4 + yrColor[2] * 0.6);
            const alpha = 0.5 + (yIdx / numYears) * 0.4;

            ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.lineWidth = BAR_WIDTH;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // Count label at end of bar (only for larger bars)
            if (barLen > 20) {
              const labelR = barStart + barLen + 10;
              const tx = cx + Math.cos(barAngle) * labelR;
              const ty = cy + Math.sin(barAngle) * labelR;

              ctx.font = "600 9px Inter, system-ui, sans-serif";
              ctx.fillStyle = `rgba(${r},${g},${b},0.8)`;
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(String(count), tx, ty);
            }
          });

          // Category label
          const labelR = barStart + BAR_MAX_LENGTH + 24;
          const lbx = cx + Math.cos(sliceMidAngle) * labelR;
          const lby = cy + Math.sin(sliceMidAngle) * labelR;

          ctx.font = "700 10px Inter, system-ui, sans-serif";
          ctx.fillStyle = `rgba(${catColor[0]},${catColor[1]},${catColor[2]},0.85)`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(CATEGORIES[catKey].label, lbx, lby);

          // Category total
          const catTotal = YEARS.reduce((s, y) => s + data[catKey][y], 0);
          const totalLbR = labelR + 14;
          const tlx = cx + Math.cos(sliceMidAngle) * totalLbR;
          const tly = cy + Math.sin(sliceMidAngle) * totalLbR;
          ctx.font = "500 9px Inter, system-ui, sans-serif";
          ctx.fillStyle = "rgba(255,255,255,0.35)";
          ctx.fillText(String(catTotal), tlx, tly);

          // Thin separator line between category groups
          if (catIdx < activeCats.length - 1) {
            const sepAngle = sliceEndAngle + catPadAngle / 2;
            const sx1 = cx + Math.cos(sepAngle) * (barStart - 4);
            const sy1 = cy + Math.sin(sepAngle) * (barStart - 4);
            const sx2 = cx + Math.cos(sepAngle) * (barStart + BAR_MAX_LENGTH + 5);
            const sy2 = cy + Math.sin(sepAngle) * (barStart + BAR_MAX_LENGTH + 5);
            ctx.strokeStyle = "rgba(255,255,255,0.06)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
          }
        });

        // Year legend (inside lens, bottom area)
        drawYearLegend(cx, cy, R);
      }

      function drawYearLegend(cx, cy, R) {
        if (activeYear !== "all") return;

        const legendY = cy + R * 0.45;
        const totalW = YEARS.length * 40;
        let x = cx - totalW / 2;

        YEARS.forEach((yr, i) => {
          const yc = YEAR_COLORS[yr];
          // Small rect
          ctx.fillStyle = `rgba(${yc[0]},${yc[1]},${yc[2]},0.7)`;
          ctx.beginPath();
          ctx.roundRect(x, legendY, 12, 4, 2);
          ctx.fill();

          // Label
          ctx.font = "500 9px Inter, system-ui, sans-serif";
          ctx.fillStyle = "rgba(255,255,255,0.4)";
          ctx.textAlign = "left";
          ctx.textBaseline = "middle";
          ctx.fillText(String(yr), x + 15, legendY + 2);

          x += 40;
        });
      }

      // ═══════════════════════════════════════
      // TOOLTIP
      // ═══════════════════════════════════════
      function updateTooltip(cx, cy, R, count) {
        const tt = document.getElementById("lensTooltip");
        const el = document.getElementById("lensCount");
        const milesEl = document.getElementById("lensMiles");

        if (R > 10) {
          tt.classList.add("visible");
          tt.style.left = (cx - 50) + "px";
          tt.style.top = (cy - R * 0.35) + "px";
          tt.style.width = "100px";
          el.textContent = count.toLocaleString();
          milesEl.textContent = radiusMiles + " mi radius";
        } else {
          tt.classList.remove("visible");
        }
      }

      // ═══════════════════════════════════════
      // INTERACTION
      // ═══════════════════════════════════════
      const interLayer = document.getElementById("interactionLayer");

      interLayer.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        mouseOnMap = true;
        document.getElementById("instruction").classList.add("hidden");
      });

      interLayer.addEventListener("mouseleave", () => { mouseOnMap = false; });

      // Scroll → map zoom
      interLayer.addEventListener("wheel", (e) => {
        document.getElementById("viewDiv").dispatchEvent(
          new WheelEvent("wheel", {
            clientX: e.clientX, clientY: e.clientY,
            deltaX: e.deltaX, deltaY: e.deltaY, deltaMode: e.deltaMode,
            bubbles: true, cancelable: true
          })
        );
      });

      // Drag → map pan
      let isDragging = false;
      interLayer.addEventListener("mousedown", (e) => {
        isDragging = true;
        interLayer.style.pointerEvents = "none";
      });
      document.addEventListener("mouseup", () => {
        if (isDragging) { isDragging = false; interLayer.style.pointerEvents = "auto"; }
      });
      document.addEventListener("mousemove", (e) => {
        if (isDragging) { mouseX = e.clientX; mouseY = e.clientY; }
      });

      // Category buttons
      document.querySelectorAll(".category-bar .pill-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".category-bar .pill-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeCat = btn.dataset.cat;
          projectPoints();
        });
      });

      // Year buttons
      document.querySelectorAll(".year-bar .pill-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".year-bar .pill-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeYear = btn.dataset.year;
          projectPoints();
        });
      });

      // Radius buttons
      document.querySelectorAll(".radius-bar .pill-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".radius-bar .pill-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          radiusMiles = parseInt(btn.dataset.miles);
        });
      });

      // ═══════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════
      view.when(() => {
        projectPoints();
        view.watch("extent", () => projectPoints());
        view.watch("zoom", () => projectPoints());
        requestAnimationFrame(drawFrame);
        setTimeout(() => document.getElementById("loadingOverlay").classList.add("hidden"), 600);
      }, (err) => {
        console.error("View failed:", err);
        projectPoints();
        requestAnimationFrame(drawFrame);
        document.getElementById("loadingOverlay").classList.add("hidden");
      });

    });
  </script>
</body>
</html>
